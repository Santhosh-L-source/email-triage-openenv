name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "santhosh@hf-sync.local"
          git config --global user.name "HF Sync"
          git push --force \
            https://SanthoshL:$HF_TOKEN@huggingface.co/spaces/SanthoshL/email-triage-openenv.git \
            main
